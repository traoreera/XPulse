name: XPulse
version: 0.1.0
author: xcore team's
description: >
  XPulse est un systeme de notification realtime

execution_mode: trusted
entry_point: src/main.py

requires:
  - name: auth
    version: ">=0.1.0, <0.3.0"

permissions: 
  - resource: "stream"
    actions: ["read", "write", "execute"]
    effect: allow
  - resource: "xpulse.publish"
    actions: ["read", "write", "execute"]
    effect: allow
  - resource: "xflow.integration"
    actions: ['*']
    effect: allow

resources:
  timeout_seconds: 10
  max_memory_mb: 100
  max_disk_mb: 1
  rate_limit:
    calls: 100
    period_seconds: 60


runtime:
  health_check:
    enabled: true
    interval_secget("status") == "error":
                    span.set_status("error")onds: 60
    timeout_seconds: 3
  
  retry:
    max_attempts: 3
    backoff_seconds: 3.0

env:
  url: redis://localhost:6379/0
  channel: ['notification', 'systeme', 'hunters']
  MAX_CONCURRENT_STREAMS :  1000
  MAX_CHANNELS_PER_STREAM:  20       # limite de channels par connexion SSE
  HEARTBEAT_INTERVAL     :  15.0
  MESSAGE_TIMEOUT        :  0.05
  RECONNECT_MAX_RETRIES  :  5
  RECONNECT_BASE_DELAY   :  0.5
